<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Daily Tasks - AdsClickCoin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Daily Tasks</h1>
        <div class="card" style="background: #fff3cd; color: #856404; border: 1px solid #ffeeba;">
            <p><b>সতর্কতা:</b> ভুল কাজ করলে পেমেন্ট পাবেন না। এডে ক্লিক করে অবশ্যই ৩০ সেকেন্ড অপেক্ষা করুন!</p>
        </div>

        <div id="task-list"></div>
    </div>

    <!-- পপ-আন্ডার অ্যাড কোড এখানে বসান -->
    <div id="popunder-container">
        [আপনার পপ-আন্ডার এইচটিএমএল কোড এখানে]
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-link">🏠</a>
        <a href="tasks.html" class="nav-link" style="border-bottom: 3px solid #28a745;">📋</a>
        <a href="refer.html" class="nav-link">👥</a>
        <a href="wallet.html" class="nav-link">💰</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script type="module">
        import { adTasks } from './ads.js';
        import './script.js'; // স্ক্রিপ্ট ফাইল ইমপোর্ট করা

        const list = document.getElementById('task-list');

        adTasks.forEach(task => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <p style="font-weight: bold;">${task.title} - (০.৫০ টাকা)</p>
                <button class="btn-green" onclick="handleTask('${task.adLink}', ${task.id})">Start Task</button>
            `;
            list.appendChild(card);
        });
    </script>
</body>
</html>
