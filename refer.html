<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Refer - AdsClickCoin</title>
</head>
<body>
    <div class="container">
        <h1>Referral System</h1>
        <div class="card">
            <p>Your Referral ID: <b id="refer-id">Loading...</b></p>
            <p style="font-size: 14px; color: gray;">আপনার আইডিটি বন্ধুদের শেয়ার করুন!</p>
            <button class="btn-blue" onclick="copyReferLink()">Copy Referral Link</button>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-link">🏠</a>
        <a href="tasks.html" class="nav-link">📋</a>
        <a href="refer.html" class="nav-link" style="border-bottom: 3px solid #28a745;">👥</a>
        <a href="wallet.html" class="nav-link">💰</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        // ইউজার আইডি সেট করা
        const userId = tg.initDataUnsafe.user?.id || "N/A";
        document.getElementById('refer-id').innerText = userId;

        function copyReferLink() {
            const link = `https://t.me/YOUR_BOT_USERNAME?start=${userId}`;
            navigator.clipboard.writeText(link);
            alert("Referral Link copied!");
        }
    </script>
</body>
</html>
