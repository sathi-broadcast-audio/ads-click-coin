<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral - AdsClickCoin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Referral System</h1>
        
        <div class="card">
            <h3>Your Referral Link</h3>
            <input type="text" id="referralLinkInput" readonly>
            <button class="btn-green" onclick="copyRefLink()">Copy Link</button>
        </div>

        <h3>Your Referral History</h3>
        <div id="refer-list">
            <p>Loading your referrals...</p>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-link">🏠</a>
        <a href="tasks.html" class="nav-link">📋</a>
        <a href="refer.html" class="nav-link" style="border-bottom: 3px solid #28a745;">👥</a>
        <a href="wallet.html" class="nav-link">💰</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="script.js"></script>
    
    <script>
        function copyRefLink() {
            const copyText = document.getElementById("referralLinkInput");
            copyText.select();
            document.execCommand("copy");
            alert("Link Copied!");
        }
    </script>
</body>
</html>
