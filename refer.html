<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Refer - AdsClickCoin</title>
</head>
<body>
    <div class="container">
        <h1>Referral System</h1>
        <div class="card">
            <h3>Your Referral Link</h3>
            <input type="text" id="refLink" readonly style="text-align: center; font-weight: bold;">
            <button class="btn-green" onclick="copyLink()">Copy Link</button>
        </div>
        
        <h3>Referral History</h3>
        <div id="refer-list"></div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-link">🏠</a>
        <a href="tasks.html" class="nav-link">📋</a>
        <a href="refer.html" class="nav-link" style="border-bottom: 3px solid #28a745;">👥</a>
        <a href="wallet.html" class="nav-link">💰</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module">
        import { getReferLink, loadReferrals } from './script.js';
        
        // লিংক সেট করা
        document.getElementById('refLink').value = getReferLink();
        
        // রেফারাল লিস্ট লোড করা
        loadReferrals();

        window.copyLink = () => {
            const copyText = document.getElementById("refLink");
            copyText.select();
            document.execCommand("copy");
            alert("Referral Link copied to clipboard!");
        };
    </script>
</body>
</html>
