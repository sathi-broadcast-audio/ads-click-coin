<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Ads Click Coin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-container">
        <header class="profile-header">
            <div class="avatar" id="user-avatar">👤</div>
            <h2 id="user-name">Loading...</h2>
            <p>Telegram ID: <span id="user-id">000000</span></p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <p>Total Income</p>
                <h3 id="total-income">$0.000</h3>
            </div>
            <div class="stat-card">
                <p>Available Balance</p>
                <h3 id="current-balance">$0.000</h3>
            </div>
            <div class="stat-card">
                <p>Total Withdrawals</p>
                <h3 id="total-withdrawals">$0.000</h3>
            </div>
            <div class="stat-card">
                <p>Total Referrals</p>
                <h3 id="total-refs">0</h3>
            </div>
        </div>
        
        <div class="account-actions">
            <button class="action-btn" onclick="location.href='refer.html'">Invite Friends</button>
            <button class="action-btn" onclick="location.href='wallet.html'">Update Wallet</button>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item">Home</a>
        <a href="tasks.html" class="nav-item">Tasks</a>
        <a href="refer.html" class="nav-item">Refer</a>
        <a href="wallet.html" class="nav-item">Wallet</a>
        <a href="profile.html" class="nav-item">Profile</a>
    </nav>
</body>
</html>
