<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Profile - AdsClickCoin</title>
</head>
<body>
    <div class="container">
        <h1>My Profile</h1>
        <div class="card" style="text-align: center;">
            <div id="profile-pic" style="width: 80px; height: 80px; background: #ddd; border-radius: 50%; margin: 0 auto 15px;"></div>
            <h3 id="username">Loading...</h3>
            <p>User ID: <span id="user-id">Loading...</span></p>
        </div>
        
        <div class="card">
            <h3>Account Details</h3>
            <p>Status: <b style="color: green;">Verified</b></p>
            <p>Joined: 2026</p>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-link">🏠</a>
        <a href="tasks.html" class="nav-link">📋</a>
        <a href="refer.html" class="nav-link">👥</a>
        <a href="wallet.html" class="nav-link">💰</a>
        <a href="profile.html" class="nav-link" style="border-bottom: 3px solid #28a745;">👤</a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const user = tg.initDataUnsafe.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name + " " + (user.last_name || "");
            document.getElementById('user-id').innerText = user.id;
            
            // টেলিগ্রামের ফটো থাকলে দেখানোর জন্য
            if (user.photo_url) {
                document.getElementById('profile-pic').innerHTML = `<img src="${user.photo_url}" style="width:80px; border-radius:50%;">`;
            }
        }
    </script>
</body>
</html>
