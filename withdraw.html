<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Withdraw - AdsClickCoin</title>
</head>
<body>
    <div class="container">
        <h1>Withdraw Request</h1>
        <div class="card">
            <input type="text" id="walletNum" placeholder="Enter Bkash/Nagad Number" style="width: 90%; padding: 10px; margin-bottom: 10px;">
            <button class="btn-green" onclick="submitWithdraw()">Submit Withdrawal</button>
        </div>

        <div class="card">
            <h3>Withdrawal History</h3>
            <div id="withdraw-list"></div>
        </div>
    </div>

    <div class="nav-bar">
        </div>

    <script type="module">
        import { getData, setData } from './api.js';
        const tg = window.Telegram.WebApp;
        
        async function loadHistory() {
            const userData = await getData(`user_${tg.initDataUnsafe.user?.id}`) || { history: [] };
            const list = document.getElementById('withdraw-list');
            list.innerHTML = userData.history.map(h => `<p>${h.amount} BDT - <b>${h.status}</b></p>`).join('');
        }
        loadHistory();
    </script>
</body>
</html>
