<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header><h1>Withdrawal</h1></header>
        
        <div class="balance-card">
            <p>Enter details for withdrawal</p>
            <input type="number" id="amount" placeholder="Amount (Minimum 20)">
            <select id="method" style="width:100%; padding:15px; background:#251a38; color:white; border-radius:12px; margin-top:8px; border:1px solid #3d2c5e;">
                <option>bKash</option>
                <option>Nagad</option>
                <option>Rocket</option>
            </select>
            <input type="text" id="account-number" placeholder="Account Number">
            <button class="withdraw-main-btn" style="margin-top:20px;" onclick="processWithdraw()">Confirm Request</button>
        </div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="tasks.html" class="nav-item"><i class="fas fa-tasks"></i><span>Tasks</span></a>
        <a href="refer.html" class="nav-item"><i class="fas fa-user-friends"></i><span>Refer</span></a>
        <a href="wallet.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>
    <script src="script.js"></script>
</body>
</html>
