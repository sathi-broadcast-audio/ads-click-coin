<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 90px; }
        
        /* লোডিং সিস্টেম */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #28a745; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { padding: 20px; }
        .hero-card { background: linear-gradient(135deg, #28a745, #20c997); color: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(40,167,69,0.3); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #fff; padding: 15px 0; border-top: 2px solid #eee; z-index: 1000; }
        .nav-link { font-size: 28px; text-decoration: none; opacity: 0.6; }
        .nav-link.active { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>
    <!-- লোডিং স্ক্রিন -->
    <div id="loader"><div class="spinner"></div></div>

    <div class="container">
        <div class="hero-card">
            <h1>AdsClickCoin</h1>
            <p>Welcome, <span id="username">User</span></p>
            <button style="background: white; color: #28a745; border: none; padding: 10px 30px; border-radius: 20px; font-weight: bold; cursor: pointer;" onclick="location.href='tasks.html'">START EARNING</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><h3>💰</h3><p>Balance</p><b>0.00</b></div>
            <div class="stat-card"><h3>⏳</h3><p>Pending</p><b>0.00</b></div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-link active">🏠</a>
        <a href="tasks.html" class="nav-link">📋</a>
        <a href="refer.html" class="nav-link">👥</a>
        <a href="wallet.html" class="nav-link">💰</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script>
        // লোডিং স্ক্রিন সরানোর লজিক
        window.onload = () => { setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800); }
    </script>
</body>
</html>
