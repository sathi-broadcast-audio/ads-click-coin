<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Home - AdsClickCoin</title>
    <style>
        /* লোডিং পাইপ স্টাইল */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .pipe-container { width: 80%; height: 20px; border: 3px solid #333; border-radius: 10px; overflow: hidden; }
        .pipe-fill { width: 0%; height: 100%; background: #28a745; animation: fill 2s forwards; }
        @keyframes fill { from { width: 0%; } to { width: 100%; } }
    </style>
</head>
<body>

    <div id="preloader">
        <p>Loading System...</p>
        <div class="pipe-container"><div class="pipe-fill"></div></div>
    </div>

    <div class="container">
        <h1>Welcome, <span id="username">User</span>!</h1>
        <button class="btn-green" onclick="location.href='tasks.html'">START NOW</button>
        
        <div class="card">
            <h3>Balance Info</h3>
            <p>Available: <b id="balance">0.00</b> BDT</p>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-link">🏠</a>
        <a href="tasks.html" class="nav-link">📋</a>
        <a href="refer.html" class="nav-link">👥</a>
        <a href="wallet.html" class="nav-link">💰</a>
        <a href="profile.html" class="nav-link">👤</a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { getData } from './api.js';
        
        const tg = window.Telegram.WebApp;
        tg.ready();

        // ইউজার নাম ও ব্যালেন্স লোড
        window.addEventListener('load', async () => {
            const user = tg.initDataUnsafe.user;
            if (user) {
                document.getElementById('username').innerText = user.first_name;
                const userData = await getData(`user_${user.id}`);
                if (userData) {
                    document.getElementById('balance').innerText = userData.balance.toFixed(2);
                }
            }
            // ২ সেকেন্ড পর লোডিং সরানো
            setTimeout(() => {
                document.getElementById('preloader').style.display = 'none';
            }, 2000);
        });
    </script>
</body>
</html>
